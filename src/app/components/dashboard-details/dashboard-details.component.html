<main>
  <h2>{{title}}</h2>

  <div class="card-content-row">
    <mat-card>
        <div> {{numberEntriesText}} </div>
        <div class="bold"> {{numberOfEntries}} </div>
      </mat-card>
      <mat-card>
          <div> {{totalNumberMedalsText}} </div>
          <div class="bold"> {{totalNumberMedals}} </div>
      </mat-card>
      <mat-card>
          <div> {{totalNumberAtheletesText}} </div>
          <div class="bold"> {{totalNumberAthletes}} </div>
      </mat-card>
  </div>

  <ng-container *ngIf="lineOlympic">
      <div echarts [options]="lineOlympic" class="line-chart"></div>
  </ng-container> 
  <a class="link-return-dashboard" routerLink="/dashboard">Back to dashboard</a>
</main>
